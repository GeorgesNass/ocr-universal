[pytest]
minversion = 7.0

## Where tests are located
testpaths =
    tests

## Test file naming convention
python_files =
    test_*.py

## Optional naming conventions
python_classes =
    Test*

python_functions =
    test_*

## Add src to PYTHONPATH
pythonpath =
    src

## Pytest options
addopts =
    -ra
    --strict-markers
    --disable-warnings

## Warning filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

## Custom markers
markers =
    slow: marks heavy OCR tests (large files, batch processing)
    integration: marks end-to-end OCR pipeline tests
    unit: marks fast isolated unit tests
    smoke: marks quick validation tests

## Directories to ignore during test discovery
norecursedirs =
    .git
    .github
    .venv
    venv
    env
    __pycache__
    build
    dist
    artifacts
    outputs
    logs
    models
    data
    notebooks
    docker